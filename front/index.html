<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Graphite</title>
  <script>
    // Function to apply the theme based on user preference or system settings just before the page loads
    (function () {
      try {
        const theme = localStorage.getItem('theme');
        const supportDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches === true;

        // If the user has explicitly set a theme, use it. Otherwise, use the system preference if supported.
        if (theme === 'dark' || (!theme && supportDarkMode)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) {
        // If local storage misses (by privace settings or other reasons), 
        // try to apply the system preference for dark mode as a fallback,
        // to make at least the dark mode work.
        console.warn("Acceso a localStorage bloqueado. Usando preferencia del sistema.");
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          root.classList.add('dark');
        }
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
