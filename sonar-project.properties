# Identification
sonar.projectKey=JavierSanabriaMiranda_Graphite
sonar.organization=javiersanabriamiranda
sonar.host.url=https://sonarcloud.io

# Code
sonar.sources=front/src
sonar.tests=front/tests

# Exclusions (not analyzed)
sonar.exclusions=tauri/**, node_modules/**, dist/**, public/**, front/src/data/**, front/src/assets/**, front/src/services/db/pre_designed_pages/**, front/tests/**, **/*.test.jsx, **/*.test.js

sonar.test.inclusions=**/*.test.jsx, **/*.test.js, **/*.spec.jsx, **/*.spec.js

# Test coverage
# Where Vitest left the LCOV report for coverage
sonar.javascript.lcov.reportPaths=front/coverage/lcov.info

sonar.sourceEncoding=UTF-8