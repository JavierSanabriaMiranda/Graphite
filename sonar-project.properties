# Identification
sonar.projectKey=JavierSanabriaMiranda_Graphite
sonar.organization=javiersanabriamiranda
sonar.host.url=https://sonarcloud.io

# Code
sonar.sources=front/src
sonar.tests=front/src
sonar.tests.inclusion=**/*.test.jsx,**/*.spec.jsx

# Exclusions (not analyzed)
sonar.exclusions=tauri/**, node_modules/**, dist/**, public/**, front/src/data/**, front/src/assets/fonts/**, front/src/services/db/pre_designed_pages/**

# Test coverage
# Where Vitest left the LCOV report for coverage
sonar.javascript.lcov.reportPaths=front/coverage/lcov.info
sonar.testExecutionReportPaths=front/test-report.xml

sonar.sourceEncoding=UTF-8