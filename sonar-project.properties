# Identification
sonar.projectKey=JavierSanabriaMiranda_Graphite
sonar.organization=javiersanabriamiranda
sonar.host.url=https://sonarcloud.io

# Code
sonar.sources=front/src
sonar.tests=front/src

# Exclusions (not analyzed)
sonar.exclusions=tauri/**, **/*.test.jsx, **/*.test.js, **/*.spec.jsx, **/*.spec.js, node_modules/**, dist/**, public/**, front/src/data/**, front/src/assets/**, front/src/services/db/pre_designed_pages/**

sonar.tests.inclusion=**/*.test.jsx, **/*.test.js, **/*.spec.jsx, **/*.spec.js
sonar.test.exclusions=front/src/**/*.jsx, front/src/**/*.js

# Test coverage
# Where Vitest left the LCOV report for coverage
sonar.javascript.lcov.reportPaths=front/coverage/lcov.info
sonar.testExecutionReportPaths=front/test-report.xml

sonar.sourceEncoding=UTF-8